<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Εγγραφή - Summer Camp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>

    .form-section {
      padding: 6rem;
      border-radius: 10px;
      margin-top: 10rem;
    }
    .deadline {
      font-size: 1.2rem;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.85);
      color: #b30000;
      padding: 1rem;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .form-label {
      color: rgb(3, 3, 3);
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="container">
    <div class="form-section">
      <form id="registrationForm" netlify>
  <div class="row g-3">
    <div class="col-md-6">
      <label for="firstName" class="form-label">First Name</label>
      <input type="text" class="form-control" id="firstName" required>
    </div>
    <div class="col-md-6">
      <label for="lastName" class="form-label">Last Name</label>
      <input type="text" class="form-control" id="lastName" required>
    </div>

    <div class="col-md-6">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" required>
    </div>
    <div class="col-md-6">
      <label for="phone" class="form-label">Phone</label>
      <input type="tel" class="form-control" id="phone" required>
    </div>

    <div class="col-md-6">
      <label for="age" class="form-label">Age</label>
      <input type="text" class="form-control" id="age" required>
    </div>
    <div class="col-md-6">
      <label for="category" class="form-label">Category</label>
      <select class="form-select" id="category" required>
        <option value="">Select Category</option>
        <option value="Kids">Kids</option>
        <option value="Cadets">Cadets</option>
        <option value="Juniors">Juniors</option>
        <option value="Seniors">Seniors</option>
      </select>
    </div>

    <div class="col-md-6">
      <label for="status" class="form-label">Status</label>
      <select class="form-select" id="status" required>
        <option value="">Select Status</option>
        <option value="Athlete">Athlete</option>
        <option value="Coach">Coach</option>
        <option value="Assistant">Assistant</option>
      </select>
    </div>
    <div class="col-md-6">
      <label for="tshirt" class="form-label">Tshirts</label>
      <select class="form-select" id="tshirt" required>
        <option value="">Select size</option>
        <option value="XS">XS</option>
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L">L</option>
        <option value="XL">XL</option>
        <option value="XXL">XXL</option>
      </select>
    </div>

    <!-- Athlete Distinction - Hidden Initially -->
    <div class="col-md-6" id="athlete-options" style="display: none;">
      <label for="distinction" class="form-label">Highest Distinction</label>
      <select class="form-select" id="distinction">
        <option value="">Select Distinction</option>
        <option value="Olympic">Olympic</option>
        <option value="World">World</option>
        <option value="European">European</option>
        <option value="G2">G2</option>
        <option value="G1">G1</option>
        <option value="Nationals">Nationals</option>
        <option value="Other">Other</option>
      </select>
    </div>

    <div class="col-md-6">
      <label for="club" class="form-label">Athletic Club</label>
      <input type="text" class="form-control" id="club" required>
    </div>

    <div class="col-md-6">
      <label for="country-input" class="form-label">Country</label>
      <input type="text" class="form-control" id="country-input" placeholder="Type to search..." onkeyup="filterCountries()" required>
      <ul id="country-suggestions" class="list-group" style="display: none; position: absolute; z-index: 1000;"></ul>
    </div>

    <div class="col-md-6">
      <label for="transportation" class="form-label">Transportation</label>
      <select class="form-select" id="transportation" required>
        <option value="">Select transportation</option>
        <option value="AthenToKarpenisiAndBack">Athens to Karpenisi and back</option>
        <option value="AthentsToKarpenisi">Athens to Karpenisi</option>
        <option value="KarpenisiToAthens">Karpenisi to Athens</option>
        <option value="None">None</option>
      </select>
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-success w-100">Submit</button>
    </div>
    <div id="successMessage" class="alert alert-success mt-3 d-none text-center">
      ✅ Η εγγραφή σας πραγματοποιήθηκε επιτυχώς! Θα ενημερωθείτε άμεσα με email επιβεβαίωσης της εγγραφής σας.
    </div>
  </div>
</form>

    </div>
  </div>

  <script>
    const countries = [
      "Greece", "Cyprus", "United States", "United Kingdom", "Germany", "France", "Italy", "Spain",
      "Canada", "Australia", "Brazil", "Turkey", "Serbia", "Bulgaria", "Romania", "Albania", "North Macedonia"
    ];
  
    const input = document.getElementById("country-input");
    const suggestionsList = document.getElementById("country-suggestions");
  
    // Συνάρτηση για φιλτράρισμα των χωρών με βάση το input
    function filterCountries() {
      const searchTerm = input.value.toLowerCase();
      
      // Καθαρίζουμε τις υπάρχουσες προτάσεις
      suggestionsList.innerHTML = '';
  
      if (searchTerm) {
        const filteredCountries = countries.filter(country => country.toLowerCase().includes(searchTerm));
        
        // Προσθέτουμε τις φιλτραρισμένες χώρες στην λίστα προτάσεων
        filteredCountries.forEach(country => {
          const listItem = document.createElement("li");
          listItem.classList.add("list-group-item");
          listItem.textContent = country;
          listItem.onclick = function() {
            input.value = country;  // Οριστικοποιούμε την επιλογή
            suggestionsList.style.display = "none"; // Κλείνουμε τις προτάσεις
          };
          suggestionsList.appendChild(listItem);
        });
        
        // Εμφανίζουμε τις προτάσεις αν υπάρχουν φιλτραρισμένα αποτελέσματα
        suggestionsList.style.display = filteredCountries.length > 0 ? "block" : "none";
      } else {
        suggestionsList.style.display = "none";
      }
    }
  
    // Κλείσιμο της λίστας προτάσεων όταν ο χρήστης κάνει κλικ εκτός
    document.addEventListener("click", function(event) {
      if (!input.contains(event.target) && !suggestionsList.contains(event.target)) {
        suggestionsList.style.display = "none";
      }
    });
  </script>
  <script>
    // Εμφάνιση distinction μόνο για Athletes
    document.getElementById("status").addEventListener("change", function () {
      const athleteOptions = document.getElementById("athlete-options");
      if (this.value === "Athlete") {
        athleteOptions.style.display = "block";
      } else {
        athleteOptions.style.display = "none";
      }
    });
  </script>

  <script>
    const form = document.getElementById('registrationForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const data = {
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      country: document.getElementById('country-input').value,      
      age: document.getElementById('age').value,
      club: document.getElementById('club').value,
      tshirt: document.getElementById('tshirt').value,
      status: document.getElementById('status').value,
      distinction: document.getElementById('distinction').value,
      category: document.getElementById('category').value,
      transportation: document.getElementById('transportation').value, // 💡 Προσαρμοσμένο id
    };

      fetch('https://script.google.com/macros/s/AKfycbxbAQdNcT4nqdqb2g8mnG0CKb6fv7bki2w4-RDLPQobDZ1hH4_PHSpm_TpdAieHleQC/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data),
      })
      .then(() => {
        successMessage.innerText = "✅ Your registration was successful! You will be notified shortly with a confirmation email.";
        successMessage.classList.remove('d-none');
        form.reset();
      })
      .catch(err => {
          alert('⚠ Σφάλμα υποβολής: ' + err.message);
      });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <div id="footer-placeholder"></div>
<script>
  // Φόρτωση header/footer δυναμικά
  fetch('header.html').then(res => res.text()).then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
  });
  fetch('footer.html').then(res => res.text()).then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;
  });
  
</script>
<script>
  const sections = document.querySelectorAll("section");
  const navLinks = document.querySelectorAll(".nav-link, .footer-link");

  window.addEventListener("scroll", () => {
    let current = "";
    sections.forEach(section => {
      const sectionTop = section.offsetTop - 100;
      if (pageYOffset >= sectionTop) {
        current = section.getAttribute("id");
      }
    });

    navLinks.forEach(link => {
      link.classList.remove("active");
      if (link.getAttribute("href").includes(current)) {
        link.classList.add("active");
      }
    });
  });
</script>

</body>
</html>
