<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration - Summer Mountain Taekwondo Training Camp 2026 Karpenisi</title>
  <link rel="icon" type="image/png" href="img/smtt-logo-Apr25white.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .form-section {
      padding: 6rem;
      border-radius: 10px;
      margin-top: 10rem;
    }
    .deadline {
      font-size: 1.2rem;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.85);
      color: #b30000;
      padding: 1rem;
      text-align: center;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .form-label {
      color: rgb(3, 3, 3);
    }
  </style>
  <meta name="description" content="Register for the Summer Mountain Taekwondo Training Camp 2026 in Karpenisi, Greece.">
  <meta name="robots" content="noindex">
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="container">
    <div class="form-section">
      <form id="registrationForm" name="registration" method="POST" data-netlify="true" netlify-honeypot="bot-field">
  <input type="hidden" name="form-name" value="registration" />
  <input type="hidden" name="subject" value="New camp registration from %{formName}" />
  <p style="display:none"><label>Don't fill this out: <input name="bot-field" /></label></p>
  <div class="row g-3">
    <div class="col-md-6">
      <label for="firstName" class="form-label">First Name</label>
      <input type="text" class="form-control" id="firstName" name="firstName" required>
    </div>
    <div class="col-md-6">
      <label for="lastName" class="form-label">Last Name</label>
      <input type="text" class="form-control" id="lastName" name="lastName" required>
    </div>

    <div class="col-md-6">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="col-md-6">
      <label for="phone" class="form-label">Phone</label>
      <input type="tel" class="form-control" id="phone" name="phone" required>
    </div>

    <div class="col-md-6">
      <label for="age" class="form-label">Age</label>
      <input type="number" min="3" max="99" class="form-control" id="age" name="age" required>
    </div>
    <div class="col-md-6">
      <label for="category" class="form-label">Category</label>
      <select class="form-select" id="category" name="category" required>
        <option value="">Select Category</option>
        <option value="Kids">Kids</option>
        <option value="Cadets">Cadets</option>
        <option value="Juniors">Juniors</option>
        <option value="Seniors">Seniors</option>
      </select>
    </div>

          <div class="col-md-6">
            <label for="status" class="form-label">Status</label>
            <select class="form-select" id="status" name="status" required>
              <option value="">Select Status</option>
              <option value="Athlete">Athlete</option>
              <option value="Coach">Coach</option>
              <option value="Assistant">Assistant</option>
            </select>
          </div>

          <div id="athlete-options-container" style="display: none;">
          <div class="row"> <div class="col-md-6 mb-3">
              <label for="category" class="form-label">Category</label>
              <select class="form-select" id="category" name="category" required>
                <option value="">Select Category</option>
                <option value="Kids">Kids</option>
                <option value="Cadets">Cadets</option>
                <option value="Juniors">Juniors</option>
                <option value="Seniors">Seniors</option>
              </select>
            </div>

            <div class="col-md-6 mb-3">
              <label for="distinction" class="form-label">Highest Distinction</label>
              <select class="form-select" id="distinction" name="distinction">
                <option value="">Select Distinction</option>
                <option value="Olympic">Olympic</option>
                <option value="World">World</option>
                <option value="European">European</option>
                <option value="G2">G2</option>
                <option value="G1">G1</option>
                <option value="Nationals">Nationals</option>
                <option value="Other">Other</option>
              </select>
            </div>

          </div>
        </div>
          
          <div class="col-md-6">
            <label for="tshirt" class="form-label">Tshirts</label>
            <select class="form-select" id="tshirt" name="tshirt" required>
              <option value="">Select size</option>
              <option value="YS">YS (6-8 years old)</option>
              <option value="YM">YM (8-10 years old)</option>
              <option value="YL">YL (10-12 years old)</option>
              <option value="YXL">YXL (12-14 years old)</option>
              <option value="YXXL">YXXL (14-16 years old)</option>
              <option value="S">S</option>
              <option value="M">M</option>
              <option value="L">L</option>
              <option value="XL">XL</option>
              <option value="XXL">XXL</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="club" class="form-label">Athletic Club</label>
            <input type="text" class="form-control" id="club" name="club" maxlength="100" required>
          </div>

          <!-- Χώρα: Select Dropdown για μεγαλύτερη ασφάλεια -->
          <div class="col-md-6">
            <label for="country-input" class="form-label">Country</label>
            <!-- Το list="country-options" συνδέει το input με το datalist από κάτω -->
            <input type="text" class="form-control" id="country-input" name="country" list="country-options" placeholder="Type to search..." required>
            
            <datalist id="country-options">
              <option value="Greece"></option>
              <option value="Cyprus"></option>
              <option value="United States"></option>
              <option value="United Kingdom"></option>
              <option value="Germany"></option>
              <option value="France"></option>
              <option value="Italy"></option>
              <option value="Spain"></option>
              <option value="Canada"></option>
              <option value="Australia"></option>
              <option value="Brazil"></option>
              <option value="Turkey"></option>
              <option value="Serbia"></option>
              <option value="Bulgaria"></option>
              <option value="Romania"></option>
              <option value="Albania"></option>
              <option value="North Macedonia"></option>
            </datalist>
          </div>

    <div class="col-md-6">
      <label for="transportation" class="form-label">Transportation</label>
      <select class="form-select" id="transportation" name="transportation" required>
        <option value="">Select transportation</option>
        <option value="AthenToKarpenisiAndBack">Athens to Karpenisi and back</option>
        <option value="AthentsToKarpenisi">Athens to Karpenisi</option>
        <option value="KarpenisiToAthens">Karpenisi to Athens</option>
        <option value="None">None</option>
      </select>
    </div>

    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="consent" name="consent" value="yes" required>
        <label class="form-check-label" for="consent">
          I consent to the collection and processing of my personal data for the purpose of registering for the Summer Mountain Taekwondo Training Camp 2026, in accordance with GDPR regulations.
        </label>
      </div>
    </div>

    <div class="col-12 text-center">
    <button id="submitBtn" type="submit" class="btn btn-success w-100">
      Register
    </button>
    <div id="spinner" class="spinner-border text-success mt-3" role="status" style="display: none;">
      <span class="visually-hidden">Submitting...</span>
    </div>
  </div>

    <div id="successMessage" class="alert alert-success mt-3 d-none text-center">
      ✅ Your registration was successful! You will be notified shortly with a confirmation email.
    </div>
  </div>
</form>

    </div>
  </div>

  <script>
    const countries = [
      "Greece", "Cyprus", "United States", "United Kingdom", "Germany", "France", "Italy", "Spain",
      "Canada", "Australia", "Brazil", "Turkey", "Serbia", "Bulgaria", "Romania", "Albania", "North Macedonia"
    ];
  
    const input = document.getElementById("country-input");
    const suggestionsList = document.getElementById("country-suggestions");
  
    // Συνάρτηση για φιλτράρισμα των χωρών με βάση το input
    function filterCountries() {
      const searchTerm = input.value.toLowerCase();
      
      // Καθαρίζουμε τις υπάρχουσες προτάσεις
      suggestionsList.innerHTML = '';
  
      if (searchTerm) {
        const filteredCountries = countries.filter(country => country.toLowerCase().includes(searchTerm));
        
        // Προσθέτουμε τις φιλτραρισμένες χώρες στην λίστα προτάσεων
        filteredCountries.forEach(country => {
          const listItem = document.createElement("li");
          listItem.classList.add("list-group-item");
          listItem.textContent = country;
          listItem.onclick = function() {
            input.value = country;  // Οριστικοποιούμε την επιλογή
            suggestionsList.style.display = "none"; // Κλείνουμε τις προτάσεις
          };
          suggestionsList.appendChild(listItem);
        });
        
        // Εμφανίζουμε τις προτάσεις αν υπάρχουν φιλτραρισμένα αποτελέσματα
        suggestionsList.style.display = filteredCountries.length > 0 ? "block" : "none";
      } else {
        suggestionsList.style.display = "none";
      }
    }
  
    // Κλείσιμο της λίστας προτάσεων όταν ο χρήστης κάνει κλικ εκτός
    document.addEventListener("click", function(event) {
      if (!input.contains(event.target) && !suggestionsList.contains(event.target)) {
        suggestionsList.style.display = "none";
      }
    });
  </script>
  <script>
    // 1. Εμφάνιση distinction , category μόνο για Athletes
    document.getElementById("status").addEventListener("change", function () {
    const athleteOptionsContainer = document.getElementById("athlete-options-container");
    
    // Shows or hides the entire wrapper container
    athleteOptionsContainer.style.display = this.value === "Athlete" ? "block" : "none";
  });

    // 2. Υποβολή στο Google Apps Script
    const form = document.getElementById('registrationForm');
    const successMessage = document.getElementById('successMessage');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    submitBtn.disabled = true;
    spinner.style.display = 'inline-block';

    fetch('/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(new FormData(form)).toString(),
    })
    .then((response) => {
      if (response.ok) {
        successMessage.innerText = "✅ Your registration was successful! You will be notified shortly with a confirmation email.";
        successMessage.classList.remove('d-none');
        successMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
        form.reset();
      } else {
        alert('⚠ Submission failed. Please try again or contact us directly.');
      }
    })
    .catch(err => {
      alert('⚠ Submission error: ' + err.message);
    })
    .finally(() => {
      submitBtn.disabled = false;
      spinner.style.display = 'none';
    });
  });

  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <div id="footer-placeholder"></div>
<script>
  // Φόρτωση header/footer δυναμικά
  fetch('header.html').then(res => res.text()).then(data => {
    document.getElementById('header-placeholder').innerHTML = data;
  });
  fetch('footer.html').then(res => res.text()).then(data => {
    document.getElementById('footer-placeholder').innerHTML = data;
  });
  
</script>
<script>
  const sections = document.querySelectorAll("section");
  const navLinks = document.querySelectorAll(".nav-link, .footer-link");

  window.addEventListener("scroll", () => {
    let current = "";
    sections.forEach(section => {
      const sectionTop = section.offsetTop - 100;
      if (pageYOffset >= sectionTop) {
        current = section.getAttribute("id");
      }
    });

    navLinks.forEach(link => {
      link.classList.remove("active");
      if (link.getAttribute("href").includes(current)) {
        link.classList.add("active");
      }
    });
  });
</script>
<script>
  // Κλείσιμο navbar όταν πατάς σε link
  document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
    link.addEventListener('click', () => {
      const navbar = document.querySelector('.navbar-collapse.show');
      if (navbar) {
        bootstrap.Collapse.getInstance(navbar)?.hide();
      }
    });
  });

      document.addEventListener('click', function (event) {
        const navbar = document.querySelector('.navbar-collapse.show');
        const toggler = document.querySelector('.navbar-toggler');
        if (navbar && !navbar.contains(event.target) && toggler && !toggler.contains(event.target)) {
          bootstrap.Collapse.getInstance(navbar)?.hide();
        }
      });
    });
  </script>
</body>
</html>
